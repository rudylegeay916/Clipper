# ============================================================
# Phase 9 - Templates de montage (parametres visuels)
# ============================================================
# Le template actif et les effets actives se choisissent dans
# config.yaml (section templates.default). Ici : l'apparence de
# chaque template, modifiable sans toucher au code.
# ============================================================

templates:

  # Sobre et lisible : hook discret, barre fine, zoom leger
  clean_social:
    hook:
      fontsize_ratio: 0.038    # Taille du hook (fraction de la hauteur video)
      y_ratio: 0.13            # Position verticale (fraction depuis le haut, zone sure)
      color: white
      border: 4                # Contour noir (lisibilite)
      box: false               # Pas de fond
      uppercase: false
      max_chars_per_line: 22
    progress_bar:
      height: 6
      color: "white@0.65"
    zoom:
      rate: 0.0005             # Zoom par frame (0.0005 x 30fps = +1.5%/s)
      max: 1.05                # Zoom maximal (5%)

  # Phase 13.5 : hook creatif anime, zoom quasi nul, jamais de watermark.
  # Le hook affiche est le selected_hook de creative_manifest.json.
  creative_social:
    hook:
      fontsize_ratio: 0.042
      y_ratio: 0.12            # Haut, zone sure, hors visage et sous-titres
      color: white
      border: 4
      box: false
      uppercase: false
      max_chars_per_line: 22
      fade_in: 0.35            # Animation courte et discrete (fondu d'entree)
      highlight_word: true     # Le mot fort du hook en jaune
    progress_bar:
      height: 6
      color: "white@0.6"
    zoom:
      rate: 0.0                # Zoom nul : sous-titres jamais agrandis
      max: 1.0

  # Plus punchy : hook massif sur fond, barre visible, zoom marque
  punchy_short:
    hook:
      fontsize_ratio: 0.050
      y_ratio: 0.11
      color: yellow
      border: 5
      box: true
      box_color: "black@0.55"
      uppercase: true
      max_chars_per_line: 16
    progress_bar:
      height: 10
      color: "yellow@0.8"
    zoom:
      rate: 0.0009
      max: 1.10
