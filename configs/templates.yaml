# ============================================================
# Phase 9 - Templates de montage automatique
# ============================================================
# Chaque template definit un "style" de montage reutilisable.
# Pour le MVP, seul le template "minimal" est utilise (aucun
# effet). Les autres options seront activees en Phase 9.
# ============================================================

# Template actif par defaut
default_template: minimal

templates:

  # MVP : aucun effet, juste le clip vertical + sous-titres
  minimal:
    ken_burns: false             # Zoom progressif leger
    zoom_punch: false            # Zoom-punch sur les moments intenses
    hook_overlay: false          # Texte accrocheur dans les 2 premieres secondes
    watermark:
      enabled: false
    background_music:
      enabled: false

  # Phase 9 : montage dynamique complet
  dynamic:
    ken_burns: true
    ken_burns_zoom: 1.08         # Zoom final (1.0 = aucun zoom)
    zoom_punch: true
    zoom_punch_scale: 1.12       # Intensite du zoom-punch
    hook_overlay: true
    hook_duration: 2.0           # Duree d'affichage du hook (secondes)
    hook_font_size: 80
    hook_position_vertical: 25   # % depuis le haut
    watermark:
      enabled: false
      file: assets/logo/logo.png
      position: top_right        # top_left | top_right | bottom_left | bottom_right
      opacity: 0.7
      scale: 0.12                # Taille relative a la largeur de la video
    background_music:
      enabled: false
      folder: assets/music
      volume_db: -22             # Volume de la musique sous la voix
