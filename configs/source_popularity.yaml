source_popularity:
  enabled: true
  default_mode: auto
  cache_hours: 24

  scoring:
    minimum_editorial_score: 55
    minimum_structure_score: 40
    minimum_hook_score: 35
    minimum_confidence: 0.15

  modes:
    balanced:
      max_boost_points: 10
    popular:
      max_boost_points: 15
    original:
      max_boost_points: 6
      already_popular_penalty_cap: 4

  youtube_public:
    enabled: true
    confidence_cap: 0.65
    peak_threshold: 60
    merge_gap_seconds: 3

  youtube_analytics:
    enabled: true
    client_secrets_file: secrets/youtube_client_secret.json
    token_file: runtime/youtube_oauth_token.json
    confidence_cap: 0.90
    request_timeout_seconds: 15

  twitch:
    enabled: true
    timeout_seconds: 10
    max_pages: 5
    merge_gap_seconds: 5

  kick:
    enabled: false
