# ============================================================
# otherme_clipper - Configuration globale du pipeline
# ============================================================
# Tous les parametres ajustables sont centralises ici.
# Les configs specialisees (scoring, styles de sous-titres,
# specs plateformes, templates de montage) sont dans configs/.
# ============================================================

project:
  name: otherme_clipper

# --- Chemins (relatifs a la racine du projet) ---
paths:
  input_dir: input          # Videos sources a traiter
  output_dir: output        # Resultats (un sous-dossier par video)
  cache_dir: cache          # Transcriptions et analyses reutilisables
  samples_dir: samples      # Petites videos de test
  assets_dir: assets        # Polices, musiques, logo

# --- Systeme de reprise ---
# Si un resultat intermediaire existe deja (transcript.json,
# analysis.json, candidates.json), il est reutilise au lieu
# d'etre recalcule. Mettre overwrite: true pour forcer le recalcul.
pipeline:
  resume: true
  overwrite: false

# --- Phase 2 : ingestion ---
ingestion:
  # Formats video acceptes en entree
  allowed_extensions: [.mp4, .mkv, .mov, .avi, .webm, .ts, .flv]
  # Qualite maximale telechargee via yt-dlp (evite les fichiers 4K enormes)
  download_max_height: 1080

# --- Phase 2 bis : preview ---
preview:
  thumbnail_count: 8        # Nombre de miniatures extraites de la video
  thumbnail_width: 320      # Largeur des miniatures en pixels (hauteur auto)
  # Proxy video : si la source n'est pas lisible par un navigateur
  # (mkv, HEVC, certains mov...), une copie legere MP4 H.264/AAC est
  # generee pour le lecteur de preview. L'originale n'est JAMAIS
  # modifiee : transcription, decoupage et export utilisent toujours
  # le fichier source.
  create_proxy_if_needed: true
  proxy_max_height: 720     # Hauteur max du proxy (720p suffit pour previsualiser)
  proxy_crf: 28             # Qualite du proxy (plus haut = plus leger)
  proxy_audio_bitrate: "96k"

# --- Phase 3 : transcription ---
transcription:
  model: small              # tiny | base | small | medium | large-v3 (qualite vs vitesse)
  language: auto            # auto = detection automatique | fr | en
  word_timestamps: true     # Indispensable pour les sous-titres karaoke
  compute_type: int8        # int8 = rapide sur CPU | float16 si GPU NVIDIA
  device: auto              # auto | cpu | cuda

# --- Phase 4 : detection de silences ---
silence_detection:
  noise_threshold_db: -35        # Volume (dB) en dessous duquel on considere un silence
  min_silence_duration: 0.35     # Duree minimale (secondes) pour compter comme une pause

# --- Phase 4 : detection de changements de scene (optionnelle) ---
# Utile si la source a plusieurs cameras ou changements de contexte.
# Desactivee par defaut : elle decode toute la video (lent sur un long
# stream). Activable ici ou ponctuellement avec --scenes en CLI.
scene_detection:
  enabled: false
  threshold: 0.4                 # Sensibilite 0-1 (plus bas = plus de scenes detectees)

# --- Phase 4 : points de coupe surs ---
cut_points:
  word_margin: 0.08              # Marge minimale (s) entre un point de coupe et un mot
  min_spacing: 1.0               # Distance minimale (s) entre deux points de coupe

# --- Phases 5-6 : clips candidats et decoupage ---
clips:
  min_duration: 15          # Duree minimale d'un clip (secondes)
  max_duration: 90          # Duree maximale d'un clip (secondes)
  margin_before: 0.3        # Marge ajoutee avant le debut du clip (secondes)
  margin_after: 0.3         # Marge ajoutee apres la fin du clip (secondes)
  max_clips_per_video: 10   # Nombre maximal de clips generes par video source
  min_score: 40             # Score minimal (0-100) pour retenir un clip candidat
  max_overlap: 0.25         # Chevauchement maximal tolere entre deux clips retenus (0-1)

# --- Phase 6 : decoupage ---
cutting:
  mode: auto                # auto : copie si keyframe proche + source compatible,
                            #        reencodage precis sinon | copy | encode
  keyframe_tolerance: 0.2   # Ecart max (s) entre keyframe et debut voulu pour copier
  encode_crf: 20            # Qualite du reencodage (intermediaire : les phases 7-9
                            #   reencoderont encore, on garde de la marge)
  encode_preset: veryfast

# --- Phase 7 : reframe vertical intelligent ---
vertical:
  width: 1080
  height: 1920
  fps: source               # source = conserve le fps du clip | ou un nombre (30)
  face_detection: true      # Suivi de visage mediapipe (sinon crop central)
  detection_sample_fps: 5   # Echantillons de detection par seconde (5 suffit, rapide)
  min_detection_rate: 0.2   # Sous ce taux de detection, bascule en crop central
  smoothing: true           # Lissage du cadrage (indispensable : evite les a-coups)
  smoothing_strength: 0.7   # 0 = reactif nerveux, 1 = tres lisse et lent
  fallback: center_crop     # Strategie si aucun visage : crop central propre
  # --- Phase 7 bis v2 : stabilisation du cadrage ---
  # Philosophie : la sortie doit etre AUSSI FLUIDE que le crop central.
  # En mode auto, le tracking doit se meriter : si le visage reste
  # correctement cadre par un simple crop statique, on n'anime pas le
  # cadre. S'il faut suivre, trajectoire "cameraman" (zone morte +
  # vitesse limitee) a render_command_fps, et fallback en crop central
  # des que les metriques de stabilite depassent les seuils du profil.
  render_command_fps: 30    # Frequence des commandes de crop (30 = pas <= 3 px, invisible)
  fallback_on_jitter: true  # Active les fallbacks bases sur les metriques de stabilite
  stability: stable         # Profil par defaut : stable | balanced | follow
  # Chaque profil regle : la zone morte, la vitesse de panoramique, la
  # "zone sure" du crop statique (fraction centrale du crop ou le visage
  # est considere bien cadre -> si le visage y reste 95% du temps, crop
  # statique direct), et les seuils de fallback.
  stability_profiles:
    stable:                 # Priorite absolue a la fluidite (defaut)
      deadzone_ratio: 0.20
      max_pan_speed: 90
      safe_zone_ratio: 0.80         # Zone sure large -> crop statique tres souvent prefere
      max_average_speed: 40         # px/s de mouvement moyen tolere
      max_step_px: 4                # Saut max entre deux commandes
      max_total_distance_ratio: 1.0 # Distance totale max (en largeurs de crop)
      max_commands_per_second: 12
      max_stability_score: 20       # visual_stability_score (0 = parfait) tolere
    balanced:               # Compromis suivi / fluidite
      deadzone_ratio: 0.15
      max_pan_speed: 140
      safe_zone_ratio: 0.60
      max_average_speed: 80
      max_step_px: 6
      max_total_distance_ratio: 2.5
      max_commands_per_second: 20
      max_stability_score: 40
    follow:                 # Suit davantage le visage (sujets tres mobiles)
      deadzone_ratio: 0.10
      max_pan_speed: 200
      safe_zone_ratio: 0.40
      max_average_speed: 160
      max_step_px: 8
      max_total_distance_ratio: 6.0
      max_commands_per_second: 31
      max_stability_score: 65
  crf: 20
  preset: medium

# --- Phase 8 : sous-titres ---
subtitles:
  style: bold_classic       # Nom d'un style defini dans configs/subtitle_styles.yaml
  lead_in: 0.08             # Affiche le groupe ~80 ms avant le 1er mot (jamais en retard)
  hold: 0.15                # Garde le groupe ~150 ms apres le dernier mot
  group_gap_threshold: 0.6  # Pause > 0.6 s entre deux mots = nouveau groupe
  crf: 20
  preset: medium

# --- Phase 12 : export ---
export:
  vertical_resolution: [1080, 1920]   # Format 9:16
  fps: 30
  video_codec: libx264
  audio_codec: aac
  audio_bitrate: 192k
  crf_master: 18            # Qualite export master (plus bas = meilleure qualite)
  crf_compressed: 23        # Qualite export compresse pret a poster

# --- Journalisation ---
logging:
  level: INFO               # DEBUG | INFO | WARNING | ERROR
  log_file: output/pipeline.log
